upstream django {
    server web:8000;
}

server {
    listen 80;

    # Fichiers statiques servis directement par Nginx
    location /static/ {
        alias /app/staticfiles/;
    }

    # Tout le reste → Gunicorn
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}